<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 800 1050" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .title { font: bold 18px 'Segoe UI', sans-serif; fill: #2C2C2A; }
    .subtitle { font: 13px 'Segoe UI', sans-serif; fill: #5F5E5A; }
    .box-title { font: bold 13px 'Segoe UI', sans-serif; fill: #fff; }
    .box-sub { font: 11px 'Segoe UI', sans-serif; fill: rgba(255,255,255,0.85); }
    .label { font: 12px 'Segoe UI', sans-serif; fill: #444441; }
    .label-sm { font: 11px 'Segoe UI', sans-serif; fill: #5F5E5A; }
    .phase-label { font: bold 14px 'Segoe UI', sans-serif; fill: #444441; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    .arr-data { stroke: #1D9E75; stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="400" y="35" text-anchor="middle">PromptBIM v3.0 — Hydra Storm + PyVista Hybrid Architecture</text>
  <text class="subtitle" x="400" y="55" text-anchor="middle">Windows (RTX 4090) + macOS | PySide6 Cross-Platform GUI | 100% Open Source</text>

  <!-- ===== GUI Layer ===== -->
  <rect x="40" y="80" width="720" height="200" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text class="phase-label" x="60" y="103">GUI Layer — PySide6 (LGPL-3.0)</text>

  <!-- 2D Panel -->
  <rect x="60" y="115" width="150" height="60" rx="8" fill="#1D9E75"/>
  <text class="box-title" x="135" y="140" text-anchor="middle">2D 地籍視圖</text>
  <text class="box-sub" x="135" y="156" text-anchor="middle">matplotlib + shapely</text>

  <!-- 3D VTK Panel -->
  <rect x="230" y="115" width="170" height="60" rx="8" fill="#185FA5"/>
  <text class="box-title" x="315" y="140" text-anchor="middle">3D 工程預覽</text>
  <text class="box-sub" x="315" y="156" text-anchor="middle">PyVista + QVTKWidget</text>

  <!-- USD Hydra Panel -->
  <rect x="420" y="115" width="170" height="60" rx="8" fill="#534AB7"/>
  <text class="box-title" x="505" y="140" text-anchor="middle">USD 品質渲染</text>
  <text class="box-sub" x="505" y="156" text-anchor="middle">Hydra Storm + GL</text>

  <!-- Chat Panel -->
  <rect x="610" y="115" width="130" height="60" rx="8" fill="#993556"/>
  <text class="box-title" x="675" y="140" text-anchor="middle">AI Chat</text>
  <text class="box-sub" x="675" y="156" text-anchor="middle">QTextEdit + 🎤</text>

  <!-- Signal/Slot -->
  <rect x="60" y="195" width="690" height="35" rx="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="label" x="400" y="217" text-anchor="middle">Qt Signal/Slot + QThread + qasync — GUI ↔ Core 訊息通訊</text>

  <!-- Arrow: Signal → Core -->
  <line x1="400" y1="250" x2="400" y2="310" class="arr" marker-end="url(#ah)"/>
  <text class="label-sm" x="410" y="285">Signal/Slot</text>

  <!-- ===== Python Core Layer ===== -->
  <rect x="40" y="310" width="720" height="200" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text class="phase-label" x="60" y="333">Python Core — 100% Cross-Platform</text>

  <!-- AI Agents -->
  <rect x="60" y="350" width="140" height="55" rx="8" fill="#0F6E56"/>
  <text class="box-title" x="130" y="372" text-anchor="middle">AI Agents</text>
  <text class="box-sub" x="130" y="388" text-anchor="middle">Claude API async</text>

  <!-- BIM Generator -->
  <rect x="220" y="350" width="140" height="55" rx="8" fill="#0F6E56"/>
  <text class="box-title" x="290" y="372" text-anchor="middle">BIM Generator</text>
  <text class="box-sub" x="290" y="388" text-anchor="middle">IFC + USD output</text>

  <!-- GIS/Land -->
  <rect x="380" y="350" width="130" height="55" rx="8" fill="#0F6E56"/>
  <text class="box-title" x="445" y="372" text-anchor="middle">GIS / Land</text>
  <text class="box-sub" x="445" y="388" text-anchor="middle">geopandas + fiona</text>

  <!-- Cache+Plugin -->
  <rect x="530" y="350" width="100" height="55" rx="8" fill="#0F6E56"/>
  <text class="box-title" x="580" y="372" text-anchor="middle">Cache</text>
  <text class="box-sub" x="580" y="388" text-anchor="middle">LRU + TTL</text>

  <!-- Schemas -->
  <rect x="650" y="350" width="90" height="55" rx="8" fill="#0F6E56"/>
  <text class="box-title" x="695" y="372" text-anchor="middle">Schemas</text>
  <text class="box-sub" x="695" y="388" text-anchor="middle">Pydantic</text>

  <!-- USD Integration (NEW) -->
  <rect x="60" y="425" width="690" height="40" rx="6" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="label" x="400" y="450" text-anchor="middle">★ OpenUSD 整合層 (新增) — UsdSceneRenderer + UsdShade PBR Materials + ArcballCamera</text>

  <!-- Arrow: Core → C++ -->
  <line x1="400" y1="480" x2="400" y2="540" class="arr" marker-end="url(#ah)"/>
  <text class="label-sm" x="410" y="515">pybind11</text>

  <!-- ===== C++ Core Layer ===== -->
  <rect x="40" y="540" width="350" height="150" rx="12" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text class="phase-label" x="60" y="563">C++ Core — CMake + vcpkg</text>

  <!-- Compliance -->
  <rect x="60" y="580" width="145" height="50" rx="8" fill="#993C1D"/>
  <text class="box-title" x="132" y="600" text-anchor="middle">Compliance</text>
  <text class="box-sub" x="132" y="616" text-anchor="middle">法規引擎</text>

  <!-- Cost -->
  <rect x="225" y="580" width="145" height="50" rx="8" fill="#993C1D"/>
  <text class="box-title" x="297" y="600" text-anchor="middle">Cost Engine</text>
  <text class="box-sub" x="297" y="616" text-anchor="middle">成本估算</text>

  <!-- Build info -->
  <text class="label-sm" x="60" y="670">Windows: MSVC (VS2025) | macOS: Clang</text>

  <!-- ===== File Output ===== -->
  <rect x="430" y="540" width="330" height="150" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="1"/>
  <text class="phase-label" x="450" y="563">Output Files</text>

  <rect x="450" y="580" width="90" height="44" rx="6" fill="#854F0B"/>
  <text class="box-title" x="495" y="607" text-anchor="middle">.ifc</text>

  <rect x="555" y="580" width="90" height="44" rx="6" fill="#854F0B"/>
  <text class="box-title" x="600" y="607" text-anchor="middle">.usda</text>

  <rect x="660" y="580" width="80" height="44" rx="6" fill="#854F0B"/>
  <text class="box-title" x="700" y="607" text-anchor="middle">.svg</text>

  <text class="label-sm" x="450" y="655">IfcOpenShell (LGPL) | usd-core (Apache-2.0)</text>
  <text class="label-sm" x="450" y="670">+ .usdz (AR) + .glb (Web) + .json (summary)</text>

  <!-- Data flow arrows -->
  <path d="M290 405 L290 350" class="arr-data" marker-end="url(#ah)"/>
  <path d="M600 465 L600 540" class="arr-data" marker-end="url(#ah)"/>

  <!-- ===== Build Environments ===== -->
  <rect x="40" y="720" width="720" height="130" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text class="phase-label" x="60" y="745">Development Environments</text>

  <!-- Windows -->
  <rect x="60" y="760" width="220" height="70" rx="8" fill="#185FA5"/>
  <text class="box-title" x="170" y="785" text-anchor="middle">Windows (RTX 4090)</text>
  <text class="box-sub" x="170" y="802" text-anchor="middle">VS 2025 + conda + CMake</text>
  <text class="box-sub" x="170" y="817" text-anchor="middle">Hydra Storm GPU 加速</text>

  <!-- macOS -->
  <rect x="300" y="760" width="220" height="70" rx="8" fill="#5F5E5A"/>
  <text class="box-title" x="410" y="785" text-anchor="middle">macOS (Mac Mini M4)</text>
  <text class="box-sub" x="410" y="802" text-anchor="middle">Claude Code Sprint 執行</text>
  <text class="box-sub" x="410" y="817" text-anchor="middle">Xcode (P29 前) → VSCode</text>

  <!-- CI -->
  <rect x="540" y="760" width="200" height="70" rx="8" fill="#639922"/>
  <text class="box-title" x="640" y="785" text-anchor="middle">CI/CD</text>
  <text class="box-sub" x="640" y="802" text-anchor="middle">GitHub Actions</text>
  <text class="box-sub" x="640" y="817" text-anchor="middle">macOS + Windows matrix</text>

  <!-- ===== Roadmap Timeline ===== -->
  <rect x="40" y="880" width="720" height="55" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text class="phase-label" x="60" y="903">Roadmap</text>
  <!-- Phase bars -->
  <rect x="130" y="892" width="260" height="22" rx="4" fill="#1D9E75"/>
  <text class="box-sub" x="260" y="907" text-anchor="middle">Phase 1: P24~P29 (macOS)</text>
  <rect x="400" y="892" width="130" height="22" rx="4" fill="#185FA5"/>
  <text class="box-sub" x="465" y="907" text-anchor="middle">Phase 2: P30~31</text>
  <rect x="540" y="892" width="130" height="22" rx="4" fill="#534AB7"/>
  <text class="box-sub" x="605" y="907" text-anchor="middle">Phase 3: P32~33</text>
  <text class="label-sm" x="690" y="922" text-anchor="end">v3.0</text>

  <!-- Footer -->
  <text class="label-sm" x="400" y="1000" text-anchor="middle">PromptBIM v3.0 Architecture | Reality Matrix Inc. | 2026-03-26</text>
  <text class="label-sm" x="400" y="1015" text-anchor="middle">Hydra Storm (Apache-2.0) + PyVista (MIT) + PySide6 (LGPL) + IfcOpenShell (LGPL) + usd-core (Apache-2.0)</text>
</svg>