name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python tests + Xcode build (macOS only)
  # ---------------------------------------------------------------------------
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          activate-environment: promptbim
          auto-activate-base: false

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          pip install -e ".[dev]"

      - name: Lint
        shell: bash -el {0}
        run: ruff check src/ tests/

      - name: Test with coverage
        shell: bash -el {0}
        run: |
          pytest -m "not api and not slow" --tb=short -q \
            --cov=src/promptbim --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=70

      - name: Xcode Build
        run: |
          xcodebuild -project PromptBIMTestApp1.xcodeproj \
            -scheme PromptBIMTestApp1 \
            -destination 'platform=macOS' \
            build

  # ---------------------------------------------------------------------------
  # C++ GoogleTest matrix — macOS + Ubuntu
  # ---------------------------------------------------------------------------
  cpp-tests:
    name: C++ Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
        include:
          - os: macos-14
            cmake_preset: macos
            cc: clang
            cxx: clang++
          - os: ubuntu-22.04
            cmake_preset: linux
            cc: gcc
            cxx: g++

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: matrix.os == 'macos-14'
        run: brew install cmake

      - name: Configure
        working-directory: libpromptbim
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROMPTBIM_BUILD_TESTS=ON \
            -DPROMPTBIM_BUILD_PYTHON=OFF

      - name: Build
        working-directory: libpromptbim
        run: cmake --build build --config Release --parallel 4

      - name: Run GoogleTest
        working-directory: libpromptbim/build
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
        run: ctest --output-on-failure --timeout 60

  # ---------------------------------------------------------------------------
  # Security audit
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Security audit
        continue-on-error: true
        run: |
          # CVE-2026-4539: pygments 2.19.2 — real CVE, no fix version available yet
          # continue-on-error: conda-only packages (ifcopenshell, usd-core) may not resolve on PyPI
          pip-audit -r requirements-frozen.txt --ignore-vuln CVE-2026-4539
