name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          activate-environment: promptbim
          auto-activate-base: false

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          pip install -e ".[dev]"

      - name: Lint
        shell: bash -el {0}
        run: ruff check src/ tests/

      - name: Test with coverage
        shell: bash -el {0}
        run: |
          pytest -m "not api and not slow" --tb=short -q \
            --cov=src/promptbim --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=70

      - name: Xcode Build
        run: |
          xcodebuild -project PromptBIMTestApp1.xcodeproj \
            -scheme PromptBIMTestApp1 \
            -destination 'platform=macOS' \
            build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Security audit
        run: pip-audit -r requirements-frozen.txt --ignore-vuln PYSEC-0 || true
